services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      DATABASE_URL: file:/app/prisma/ocean.db
      INTERNAL_API_ORIGIN: http://backend:3000
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
